<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" id="metaTheme" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- Aplicar tema ANTES de pintar para evitar flash blanco -->
<script>
if(localStorage.getItem('alq-theme')==='dark'){document.documentElement.classList.add('dark');document.querySelector('#metaTheme')&&(document.querySelector('#metaTheme').content='#111c26');}
(function(){
  var ls=localStorage, cn=ls.getItem('tl_col_new'), cu=ls.getItem('tl_col_upd'), cg=ls.getItem('tl_col_urg');
  if(cn||cu||cg){
    var css=(cn?'.tag-new{background:'+cn+' !important;color:#fff !important}':'')+
            (cu?'.tag-upd{background:'+cu+' !important;border:none !important;color:#fff !important}':'')+
            (cg?'.tag-urg{background:'+cg+' !important}':'');
    var s=document.createElement('style'); s.id='cfg-tag-colors'; s.textContent=css; document.head.appendChild(s);
  }
})();
</script>
<title>Línea del Tiempo 2026–2030 — Quinquenio Joyas</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 538.4 365.89'%3E%3Cpath fill='%23706f6f' d='M538.4,128.52h-94.52C420.66,54.14,351.13,0,269.2,0S117.75,54.14,94.52,128.52H0v108.86h94.52c23.23,74.38,92.75,128.52,174.68,128.52s151.46-54.14,174.68-128.52h94.52v-108.86ZM269.2,307.82c-68.85,0-124.87-56.02-124.87-124.87s56.02-124.87,124.87-124.87,124.87,56.02,124.87,124.87-56.02,124.87-124.87,124.87Z'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TEMA: tokens que cambian con .dark en <html> ── */
:root {
  --bg:   #ffffff;  --fg:   #000000;
  --g10:  #f5f5f5;  --g20:  #e0e0e0;
  --g40:  #999999;  --g60:  #666666;  --g90:  #1a1a1a;
  --font: 'Space Grotesk','Helvetica Neue',Arial,sans-serif;
  --seg-w: clamp(64px, 10vw, 200px);   /* collapsed segment width — fluid */
  --tl-fscale: 1;                       /* escala de texto del timeline */
  --cd:    clamp(44px, 6.77vw, 150px); /* year circle diameter    — fluid */
}
html.dark {
  --bg:  #111c26;
  --fg:  #d8e8f2;
  --g10: #1a2c3a;  --g20: #2e4455;
  --g40: #627a8e;  --g60: #8aacbe;  --g90: #c8dce8;
}

html.dark body {
  background: linear-gradient(rgb(0,0,0) 0%, rgb(26,32,40) 50%, rgb(41,56,69) 100%) fixed;
}

html.dark .tl-line,
html.dark .tl-accent            { background: #5c7e96; }
html.dark .stem                 { background: #4e6878; }
html.dark .stem::after          { background: #a8c8dc;
                                   box-shadow: 0 0 0 2.5px rgb(18,26,36); }
html.dark .circle-inner         { background: #ddeef8; color: #0a1825; }
html.dark .circle-inner.current { background: #0a1825 !important; color: #ddeef8 !important;
                                   border-color: #ddeef8 !important; }
html.dark .fc-tl-line,
html.dark .fc-progress          { background: #5c7e96; }
html.dark .fc-circ              { background: #ddeef8; color: #0a1825; }
html.dark .fc-circ.current      { background: #0a1825 !important; color: #ddeef8 !important;
                                   border-color: #ddeef8 !important; }
html.dark .fc-tick              { background: #2a3e52; }
html.dark .fc-node.active .fc-tick { background: #6090aa; }

/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box;
  -webkit-tap-highlight-color: transparent; /* elimina cuadro azul en móvil */
}
::selection { background: transparent; } /* elimina resaltado azul al seleccionar texto */
html {
  background: var(--bg); /* evita overscroll blanco en modo claro */
}
html.dark {
  background: #000; /* overscroll oscuro en modo oscuro */
  color-scheme: dark;
}
html, body {
  font-family: var(--font);
  background: var(--bg); color: var(--fg);
  height:100%; overflow:hidden;
  display:flex; flex-direction:column;
  -webkit-font-smoothing:antialiased;
  transition: background .3s, color .3s;
}

/* ══════════════════════════════════════════
   LOADING SCREEN
══════════════════════════════════════════ */
#loading {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; z-index:999;
  transition: opacity .4s ease;
}
html.dark #loading {
  background: linear-gradient(rgb(0,0,0) 0%, rgb(26,32,40) 50%, rgb(41,56,69) 100%);
}
#loading.fade-out { opacity:0; pointer-events:none; }
.loading-dot-row { display:flex; gap:8px; }
.loading-dot {
  width:7px; height:7px; border-radius:50%; background:var(--fg);
  animation: ldot .9s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay:.15s; }
.loading-dot:nth-child(3) { animation-delay:.30s; }
@keyframes ldot {
  0%,100% { opacity:.15; transform:scale(.8); }
  50%     { opacity:1;   transform:scale(1.2); }
}
.loading-label {
  font-size:clamp(8px,.93vw,22px); font-weight:600; letter-spacing:.3em;
  text-transform:uppercase; color:var(--g40);
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
.header {
  flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:15px 48px; gap:16px;
  border-bottom:1px solid var(--g20);
}
.title-group { display:flex; align-items:center; gap:18px; flex-shrink:0; }
.title-group h1 { font-size:clamp(18px,2.22vw,46px); font-weight:300; color:var(--fg); letter-spacing:-.02em; line-height:1.15; }
.title-group h1 span { display:block; font-size:clamp(8px,.875vw,20px); font-weight:500; color:var(--g60); letter-spacing:.28em; text-transform:uppercase; margin-top:4px; }
.hd  { width:1px; height:34px; background:var(--g20); }
.yr  { font-size:clamp(22px,2.57vw,56px); font-weight:700; color:var(--fg); letter-spacing:-.03em; flex-shrink:0; }

.hdr-ctr { display:none; } /* movido a ctrl-panel */

/* ── Lengüeta de controles ── */
.yr-grp { display:flex; align-items:center; gap:12px; }
.ctrl-tab { display:flex; align-items:center; position:relative; }
.ctrl-tab::before {
  content:''; display:block;
  width:2px; height:clamp(22px,2vw,38px);
  background:var(--g40); flex-shrink:0; margin-right:0;
  border-radius:1px;
}
.ctrl-handle {
  width:22px; height:clamp(24px,2vw,38px); flex-shrink:0;
  border:none;
  background:none; cursor:pointer; color:var(--g60);
  display:flex; align-items:center; justify-content:center;
  border-radius:0 5px 5px 0;
  transition:color .2s;
  padding:0;
}
.ctrl-handle:hover { color:var(--fg); }
.ctrl-handle svg { width:13px; height:13px; stroke-width:3; transition:transform .32s; }
.ctrl-tab.open .ctrl-handle svg { transform:rotate(180deg); }
.ctrl-panel {
  display:flex; align-items:center; gap:6px;
  max-width:0; overflow:hidden; opacity:0; padding:0;
  transition:max-width .35s cubic-bezier(.4,0,.2,1),
             opacity    .25s cubic-bezier(.4,0,.2,1),
             padding    .35s cubic-bezier(.4,0,.2,1);
}
.ctrl-tab.open .ctrl-panel { max-width:600px; opacity:1; padding-left:8px; }

.btn-pill {
  display:inline-flex; align-items:center; gap:7px;
  border:1.5px solid var(--g20); background:none;
  height:clamp(28px,2.3vw,46px); padding:0 14px;
  font-family:var(--font); font-size:clamp(9px,.99vw,22px); font-weight:600;
  letter-spacing:.18em; text-transform:uppercase; color:var(--fg);
  cursor:pointer; white-space:nowrap;
  transition:border-color .2s, background .2s, color .2s;
}
.btn-pill:hover { border-color:var(--fg); background:var(--fg); color:var(--bg); }
.btn-pill svg   { width:11px; height:11px; flex-shrink:0; transition:stroke .2s; }

.btn-icon {
  width:clamp(28px,2.3vw,46px); height:clamp(28px,2.3vw,46px); flex-shrink:0;
  border:1.5px solid var(--g20); background:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--fg);
  transition:border-color .2s, background .2s;
}
.btn-icon:hover { border-color:var(--fg); background:var(--g10); }
.btn-icon svg   { width:13px; height:13px; }

.hdr-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.alq-brand { display:flex; align-items:center; }
.alq-logo  { height:clamp(14px,1.5vw,32px); width:auto; display:block; }
.alq-logo path { fill: var(--fg); transition: fill .3s; }
.hdr-badge { font-size:clamp(7px,.82vw,18px); font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--g40); }

/* ══════════════════════════════════════════
   VIEWS
══════════════════════════════════════════ */
.view          { display:none; flex-direction:column; flex:1; overflow:hidden; }
.view.active   { display:flex; }

/* ── SHARED: Tags ── */
.tag { display:inline-block; font-size:calc(clamp(6px,.7vw,16px) * var(--tl-fscale)); font-weight:700; padding:1px 4px; margin-left:3px; letter-spacing:.1em; text-transform:uppercase; vertical-align:middle; white-space:nowrap; }
.tag-new { background:var(--fg); color:var(--bg); }
.tag-upd { background:var(--g20); color:var(--g90); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
.tag-urg { background:#cc2200; color:#fff; transition:opacity .7s ease-in-out; }

/* ── SHARED: Market pill ── */
.market-pill {
  display:inline-block; border:1.5px solid var(--fg);
  padding:2px 9px; font-size:calc(clamp(7px,.82vw,18px) * var(--tl-fscale)); font-weight:700;
  letter-spacing:.2em; text-transform:uppercase; color:var(--fg);
  white-space:normal; text-align:center; line-height:1.5;
}

/* ══════════════════════════════════════════
   VISTA ACORDEÓN
══════════════════════════════════════════ */
.tl-wrap { flex:1; position:relative; overflow:hidden; padding:0 clamp(16px,3vw,56px); }

.tl-line {
  position:absolute; left:0; right:0; top:50%;
  height:2px; background:var(--fg);
  transform:translateY(-50%); z-index:1;
}

.tl-accent {
  position:absolute;
  top:calc(50% - 3px);
  height:6px;
  background:var(--fg);
  z-index:1;
  transition: left  .55s cubic-bezier(.4,0,.2,1),
              width .55s cubic-bezier(.4,0,.2,1);
}

.segs { position:relative; width:100%; height:100%; z-index:2; }

.seg {
  position:absolute; left:0; top:0; bottom:0;
  overflow:hidden;
  will-change: transform, width;
  transition: transform .48s cubic-bezier(.4,0,.2,1),
              width     .48s cubic-bezier(.4,0,.2,1);
}
.seg { pointer-events:none; }   /* el seg completo no captura clics */
.seg.active { overflow:visible; } /* permite que el texto del último hito no se corte */

.circle-wrap {
  position:absolute; left:0; width:var(--seg-w);
  top:50%; transform:translateY(-50%);
  display:flex; justify-content:center; align-items:center;
  z-index:12; pointer-events:auto; cursor:pointer; /* solo el círculo es clicable */
}
.circle-wrap:hover .circle-inner { transform:scale(1.07); }
.seg.active .circle-wrap { cursor:pointer; }
.circle-inner {
  width:var(--cd); height:var(--cd); border-radius:50%;
  background:var(--fg); color:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(12px,1.52vw,32px); font-weight:700; letter-spacing:-.02em;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  position:relative; z-index:2;
}
.seg.active .circle-inner          { transform:scale(1.12); }
.circle-inner.current {
  background:var(--bg); color:var(--fg);
  border:2.5px solid var(--fg);
  animation:node-pulse 2.5s ease-in-out infinite;
}
.seg.active .circle-inner.current  { animation:none; }
@keyframes node-pulse {
  0%,100%{ box-shadow:0 0 0  0 rgba(128,128,128,.2); }
  50%    { box-shadow:0 0 0 14px rgba(128,128,128,0); }
}

.year-stats {
  position:absolute; left:0; width:var(--seg-w);
  top:calc(50% + calc(var(--cd)/2 + 8px)); text-align:center; z-index:12;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.seg.active .year-stats { opacity:1; transition:opacity .4s .3s; }
.year-stats .ys-main { font-size:clamp(10px,1.28vw,28px); font-weight:700; color:var(--fg); letter-spacing:-.02em; }
.year-stats .ys-rev  { font-size:clamp(9px,1.05vw,23px); font-weight:500; color:var(--g60); margin-top:2px; }
.year-stats .ys-calc { font-size:clamp(7px,.875vw,20px); font-weight:400; color:var(--g40); margin-top:1px; }

.year-market {
  position:absolute; left:0; width:var(--seg-w);
  bottom:calc(50% + calc(var(--cd)/2 + 22px)); display:flex; justify-content:center;
  z-index:12; opacity:0; pointer-events:none; transition:opacity .2s;
}
.seg.active .year-market { opacity:1; transition:opacity .4s .3s; }

.seg-body {
  position:absolute; left:var(--seg-w); right:0; top:0; bottom:0;
  opacity:0; pointer-events:none;
  transform:translateX(0);
  transition:opacity .2s, transform .42s cubic-bezier(.4,0,.2,1);
}
.seg.active .seg-body {
  opacity:1; pointer-events:all;
  transform:translateX(0);
  transition:opacity .45s .28s, transform .42s .08s cubic-bezier(.4,0,.2,1);
}

.row-above {
  position:absolute; left:0; right:0;
  top:0; bottom:calc(50% + 1px);
}
.row-below {
  position:absolute; left:0; right:0;
  top:calc(50% + 1px); bottom:0;
}

.hito {
  position:absolute;
  display:flex; flex-direction:column; align-items:center;
  transform:translateX(-50%);
  pointer-events:none; cursor:default;  /* solo activos capturan clics */
}
.seg.active .hito { pointer-events:auto; cursor:pointer; }
.row-above .hito { bottom:0; justify-content:flex-end;   }
.row-below .hito { top:0;    justify-content:flex-start; }
.hito:hover .hline-name { opacity:.7; }

/* ── Popup de hito ── */
#hito-popup {
  position:fixed; z-index:300; display:none;
  background:var(--bg); border:1.5px solid var(--g20);
  padding:11px 15px; width:240px;
  max-height:65vh; overflow-y:auto;
  box-shadow:0 6px 28px rgba(0,0,0,.18);
  opacity:0; transform:translateY(8px);   /* default: entra desde abajo (arriba) */
  transition:opacity .22s cubic-bezier(.4,0,.2,1),
             transform .24s cubic-bezier(.4,0,.2,1);
}
#hito-popup.hp-down { transform:translateY(-8px); } /* entra desde arriba (abajo) */
#hito-popup.hp-vis  { opacity:1; transform:translateY(0); }
html.dark #hito-popup { box-shadow:0 6px 28px rgba(0,0,0,.5); }
.hp-tag  { margin-bottom:6px; }
.hp-name { font-size:clamp(10px,1.05vw,19px); font-weight:600; color:var(--fg); line-height:1.3; margin-bottom:4px; }
.hp-det  { font-size:clamp(8px,.9vw,16px); font-weight:400; color:var(--g60); line-height:1.4; margin-bottom:5px; }
.hp-sub  { font-size:clamp(7px,.8vw,14px); color:var(--g40); font-weight:500; }

.hlabel { font-size:clamp(9px,1.11vw,24px); font-weight:500; color:var(--fg); line-height:1.4; text-align:center; white-space:nowrap; }
.hline-tag  { font-size:calc(clamp(6px,.7vw,16px)   * var(--tl-fscale)); font-weight:700; display:flex; justify-content:center; white-space:nowrap; }
.hline-name { font-size:calc(clamp(9px,1.11vw,24px) * var(--tl-fscale)); font-weight:600; color:var(--fg); line-height:1.3; white-space:nowrap; }
.hline-det  { font-size:calc(clamp(7px,.93vw,20px)  * var(--tl-fscale)); font-weight:400; color:var(--g60); line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hline-date { font-size:calc(clamp(7px,.875vw,20px) * var(--tl-fscale)); color:var(--g40); white-space:nowrap; }
.hline-items{ font-size:calc(clamp(7px,.875vw,20px) * var(--tl-fscale)); color:var(--g40); white-space:nowrap; }
.hsub  { font-size:clamp(7px,.875vw,20px); color:var(--g40); text-align:center; margin-top:2px; white-space:nowrap; }

.stem  { width:1px; background:var(--fg); height:clamp(46px,5.6vw,120px); position:relative; flex-shrink:0; }
.stem::after {
  content:'';
  position:absolute; left:50%; transform:translateX(-50%);
  width:11px; height:11px;
  background:var(--fg); border-radius:50%;
  box-shadow:0 0 0 2.5px var(--bg);
}
.row-above .hito .stem { margin-top:5px; }
.row-above .hito .stem::after { bottom:-5.5px; }
.row-below .hito .stem { margin-bottom:5px; }
.row-below .hito .stem::after { top:-5.5px; }

/* ══════════════════════════════════════════
   VISTA FICHAS
══════════════════════════════════════════ */
.fc-tl { flex-shrink:0; padding:0 52px; }
.fc-tl-outer { position:relative; height:clamp(100px,13.75vw,260px); display:flex; align-items:center; }
.fc-tl-line  { position:absolute; left:0; right:0; top:50%; height:2px; background:var(--fg); transform:translateY(-50%); }
.fc-progress {
  position:absolute; left:0; top:50%; height:2px; background:var(--fg);
  transform:translateY(-50%); z-index:2;
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.fc-years { position:relative; width:100%; display:flex; justify-content:space-between; z-index:5; }

.fc-node  { display:flex; flex-direction:column; align-items:center; cursor:pointer; user-select:none; }
.fc-ticks-a, .fc-ticks-b { display:flex; gap:3px; height:clamp(14px,2.1vw,40px); justify-content:center; min-width:52px; }
.fc-ticks-a { align-items:flex-end;   margin-bottom:4px; }
.fc-ticks-b { align-items:flex-start; margin-top:4px; }
.fc-tick { width:2px; background:var(--g20); border-radius:1px; transition:background .3s; }
.fc-node.active .fc-tick { background:var(--fg); }

.fc-circ {
  width:clamp(40px,5.83vw,120px); height:clamp(40px,5.83vw,120px); border-radius:50%;
  background:var(--fg); color:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(12px,1.4vw,30px); font-weight:700; letter-spacing:-.02em;
  position:relative; z-index:3;
  transition:transform .3s, box-shadow .3s;
}
.fc-node.active .fc-circ { transform:scale(1.14); box-shadow:0 0 0 5px rgba(128,128,128,.12); }
.fc-circ.current {
  background:var(--bg); color:var(--fg); border:2.5px solid var(--fg);
  animation:node-pulse 2.5s ease-in-out infinite;
}
.fc-node.active .fc-circ.current { animation:none; }

.fc-sep    { height:1px; background:var(--g20); margin:0 52px; flex-shrink:0; }
.fc-detail { flex:1; overflow:hidden; display:flex; flex-direction:column; }
.fc-panes  { flex:1; position:relative; overflow:hidden; }

.fc-pane {
  position:absolute; inset:0; padding:18px 52px 14px;
  display:flex; flex-direction:column; gap:14px;
  opacity:0; transform:translateX(60px);
  transition:opacity .35s ease, transform .35s cubic-bezier(.4,0,.2,1);
  pointer-events:none; overflow-y:auto;
}
.fc-pane.active  { opacity:1; transform:translateX(0); pointer-events:all; }
.fc-pane::-webkit-scrollbar { width:4px; }
.fc-pane::-webkit-scrollbar-thumb { background:var(--g20); border-radius:2px; }

.fc-ph  { display:flex; flex-direction:column; align-items:flex-start; gap:10px; flex-shrink:0; }
.fc-nav { display:flex; gap:7px; }
.fc-year-row { display:flex; align-items:center; gap:20px; }
.fc-yrl { font-size:clamp(28px,3.97vw,80px); font-weight:700; color:var(--fg); letter-spacing:-.04em; line-height:1; }
.fc-sts { display:flex; gap:18px; align-items:center; }
.fc-st  { display:flex; flex-direction:column; gap:2px; }
.fc-st .sv { font-size:clamp(16px,1.98vw,42px); font-weight:700; color:var(--fg); letter-spacing:-.03em; line-height:1; }
.fc-st .sl { font-size:clamp(7px,.875vw,20px); font-weight:500; color:var(--g60); letter-spacing:.2em; text-transform:uppercase; }
.fc-sdv { width:1px; height:30px; background:var(--g20); }
.fc-nav button {
  width:32px; height:32px; border:1.5px solid var(--g20); background:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--fg);
  transition:border-color .2s, background .2s;
}
.fc-nav button:hover:not(:disabled) { border-color:var(--fg); background:var(--g10); }
.fc-nav button:disabled { opacity:.25; cursor:default; }
.fc-nav button svg { width:13px; height:13px; }

.fc-sec-lbl { font-size:clamp(7px,.875vw,20px); font-weight:700; letter-spacing:.25em; text-transform:uppercase; color:var(--g40); margin-bottom:5px; }
.fc-cards   { display:grid; grid-template-columns:repeat(auto-fill, minmax(max(148px, calc(20% - 6.4px)), 1fr)); gap:8px; }
.fc-card    {
  border:1.5px solid var(--g20); padding:10px 13px;
  min-width:0;
  background:var(--bg);
  transition:border-color .2s, box-shadow .2s;
}
.fc-card:hover { border-color:var(--g60); box-shadow:0 2px 10px rgba(0,0,0,.07); }
.fc-card-tag    { margin-bottom:5px; }
.fc-card-tag .tag { margin-left:0; font-size:calc(clamp(8px,.9vw,18px) * var(--tl-fscale)); padding:2px 7px; }
.fc-card-name   { font-size:calc(clamp(10px,1.28vw,28px) * var(--tl-fscale)); font-weight:600; color:var(--fg); line-height:1.35; margin-bottom:3px; }
.fc-card-detail { font-size:calc(clamp(9px,1.05vw,23px)  * var(--tl-fscale)); color:var(--g60); font-weight:400; line-height:1.4; margin-bottom:4px; }
.fc-card-sub    { font-size:calc(clamp(7px,.93vw,20px)   * var(--tl-fscale)); color:var(--g40); font-weight:500; }

/* ══════════════════════════════════════════
   FOOTER
══════════════════════════════════════════ */
.footer {
  flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
  padding:9px 48px 12px; border-top:1px solid var(--g10);
}
.legend { display:flex; gap:16px; }
.li     { display:flex; align-items:center; gap:6px; font-size:clamp(7px,.875vw,20px); color:var(--g60); letter-spacing:.04em; font-weight:500; }
.lsw    { width:9px; height:9px; flex-shrink:0; }
.hint   { font-size:clamp(7px,.875vw,20px); color:var(--fg); letter-spacing:.06em; font-weight:500; }

@media (prefers-reduced-motion:reduce) {
  .circle-inner.current, .fc-circ.current { animation:none; }
}
/* blink URG manejado por JS — ver urgBlink() */
#tl-lsw-urg { transition:opacity .7s ease-in-out; }

@media (max-width: 640px) {
  .header { padding:10px 16px; gap:8px; }
  .hd  { display:none; }
  .hdr-badge { display:none; }
  .footer { padding:6px 16px 8px; }
  .legend { gap:8px; flex-wrap:wrap; }
  .hint   { display:none; }
}
@media (max-width: 400px) {
  .btn-pill { padding:4px 8px; }
  .hdr-ctr  { gap:4px; }
}
</style>
</head>

<script>
/* ══════════════════════════════════════════
   SUPABASE CONFIG
══════════════════════════════════════════ */
const SUPA_URL = 'https://utkqzxsnyvblqndtkntx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0a3F6eHNueXZibHFuZHRrbnR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTU5MjEsImV4cCI6MjA5MDQ5MTkyMX0.bxOZDHRtsYBkplffNzoxc2-OQMvG8qXdX_bXxg_CYlA';

const supa = (path) => fetch(`${SUPA_URL}/rest/v1/${path}`, {
  headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json' }
}).then(r => r.json());

const supaUpsert = (table, body) => fetch(`${SUPA_URL}/rest/v1/${table}`, {
  method: 'POST',
  headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`,
             'Content-Type': 'application/json',
             'Prefer': 'resolution=merge-duplicates,return=representation' },
  body: JSON.stringify(body)
}).then(r => r.json());

/* ── helpers ── */
const TM  = {
  new: localStorage.getItem('tl_tag_new_name') || 'NEW',
  upd: localStorage.getItem('tl_tag_upd_name') || 'UPD',
  urg: localStorage.getItem('tl_tag_urg_name') || 'URG'
};

/* Escala de fuente — estado persistido */
let _fontScale = parseFloat(localStorage.getItem('tl_fscale') || '1');
/* Aplicar escala de cache antes de que llegue Supabase */
document.documentElement.style.setProperty('--tl-fscale', _fontScale);

/* Aplica config al DOM y actualiza caché localStorage */
function applyConfig(c) {
  if (!c) return;
  const ls = localStorage;

  /* Título */
  if (c.title1) {
    const h = document.getElementById('tl-main-title');
    if (h) h.childNodes[0].textContent = c.title1;
    ls.setItem('tl_title1', c.title1);
  }
  if (c.title2) {
    const sp = document.getElementById('tl-sub-title');
    if (sp) sp.textContent = c.title2;
    ls.setItem('tl_title2', c.title2);
  }

  /* Badge */
  if (c.badge) {
    const b = document.getElementById('tl-badge-text') || document.getElementById('tl-badge');
    if (b) b.textContent = c.badge;
    ls.setItem('tl_badge', c.badge);
  }

  /* Tags: nombre en TM + leyenda del footer */
  [['new', c.tag_new_name, c.tag_new_desc, c.tag_new_color],
   ['upd', c.tag_upd_name, c.tag_upd_desc, c.tag_upd_color],
   ['urg', c.tag_urg_name, c.tag_urg_desc, c.tag_urg_color]
  ].forEach(([k, name, desc, color]) => {
    if (name) { TM[k] = name; ls.setItem('tl_tag_'+k+'_name', name); }
    if (desc)  ls.setItem('tl_tag_'+k+'_desc', desc);
    /* leyenda footer */
    const legEl = document.getElementById('tl-leg-'+k);
    if (legEl) {
      const n = name || TM[k];
      const d = desc || ls.getItem('tl_tag_'+k+'_desc');
      legEl.textContent = d ? n+' — '+d : n;
    }
    /* color bolita footer */
    if (color) {
      const lsw = document.getElementById('tl-lsw-'+k);
      if (lsw) { lsw.style.background = color; if (k==='upd') lsw.style.border='none'; }
      ls.setItem('tl_col_'+k, color);
    }
  });

  /* Colores de los tags en los hitos — inyectar/actualizar <style> */
  const cn = c.tag_new_color || ls.getItem('tl_col_new');
  const cu = c.tag_upd_color || ls.getItem('tl_col_upd');
  const cg = c.tag_urg_color || ls.getItem('tl_col_urg');
  if (cn || cu || cg) {
    let st = document.getElementById('cfg-tag-colors');
    if (!st) { st = document.createElement('style'); st.id='cfg-tag-colors'; document.head.appendChild(st); }
    st.textContent =
      (cn ? `.tag-new{background:${cn} !important;color:#fff !important}` : '') +
      (cu ? `.tag-upd{background:${cu} !important;border:none !important;color:#fff !important}` : '') +
      (cg ? `.tag-urg{background:${cg} !important}` : '');
  }

  /* Escala de texto del timeline */
  if (c.font_scale != null) {
    const s = parseFloat(c.font_scale) || 1;
    document.documentElement.style.setProperty('--tl-fscale', s);
    ls.setItem('tl_fscale', s);
    _fontScale = s;
  }
}


/* Construye el tag combinando status_tag + is_urgent */
function buildTag(row) {
  if (row.is_urgent) return `<span class="tag tag-urg">${TM.urg}</span>`;
  if (row.status_tag) return `<span class="tag tag-${row.status_tag}">${TM[row.status_tag]}</span>`;
  return '';
}

/* Formatea fecha de DB (YYYY-MM-DD) a texto corto: "Sep 2026", "Ene 2027" */
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function fmtDate(dateStr) {
  if (!dateStr) return null;
  const [y, m] = dateStr.split('-');
  return `${MESES[parseInt(m,10)-1]}`;
}

/* Construye el sub-label del hito: items + fecha si existen */
function buildSub(row) {
  const parts = [];
  if (row.item_count) parts.push(`${row.item_count} items`);
  if (row.launch_date) parts.push(fmtDate(row.launch_date));
  return parts.length ? parts.join(' · ') : null;
}

/* Convierte el campo market de la DB a HTML con saltos de línea.
   Acepta \n literal, \\n escapado o <br> guardado directamente. */
function mktHtml(m) {
  if (!m) return '';
  return m.replace(/\\n|\n|<br\s*\/?>/gi, '<br>');
}

const sh = i => i % 2 === 0 ? 58 : 52;
const TICK_HEIGHTS = [10,12,14,16,18,20];
/* Genera n ticks con alturas aleatorias usando seed para que sean estables por año */
function genTicks(n, seed) {
  return Array.from({length: n}, (_, j) =>
    `<div class="fc-tick" style="height:${TICK_HEIGHTS[(seed * 3 + j * 7) % TICK_HEIGHTS.length]}px"></div>`
  ).join('');
}

/* ══════════════════════════════════════════
   FETCH Y BUILD
══════════════════════════════════════════ */
async function loadData() {
  /* Fetch paralelo: config + años + hitos */
  const [cfgRows, years, launches] = await Promise.all([
    supa('timeline_config?select=*&id=eq.1'),
    supa('timeline_years?select=*&order=year.asc'),
    supa('timeline_launches?select=*&order=position.asc')
  ]);

  /* Guardar fingerprint para detección de cambios cross-device */
  _dataFP = JSON.stringify([cfgRows, years, launches]);

  /* Aplicar configuración global (sobreescribe caché localStorage) */
  if (Array.isArray(cfgRows) && cfgRows[0]) applyConfig(cfgRows[0]);
  years.sort((a, b) => a.year - b.year);

  /* Actualizar rango de años en header y título */
  if (years.length) {
    const minY = years[0].year;
    const maxY = years[years.length - 1].year;
    const range = minY === maxY ? `${minY}` : `${minY}–${maxY}`;
    document.querySelector('.yr').textContent = range;
    document.title = `Línea del Tiempo ${range} — Quinquenio Joyas`;
  }

  /* Agrupar hitos por year_id */
  const launchMap = {};
  launches.forEach(l => {
    if (!launchMap[l.year_id]) launchMap[l.year_id] = [];
    launchMap[l.year_id].push(l);
  });

  /* Ordenar hitos: primero por launch_date si existe, luego por position */
  Object.values(launchMap).forEach(arr => {
    arr.sort((a, b) => {
      if (a.launch_date && b.launch_date) return a.launch_date.localeCompare(b.launch_date);
      if (a.launch_date) return -1;
      if (b.launch_date) return 1;
      return a.position - b.position;
    });
  });

  /* Construir YEARS en el mismo formato que usaba el HTML original */
  const YEARS = years.map(y => ({
    id:    y.id,
    year:  y.year,
    cur:   y.is_current,
    items: y.items_label,
    calc:  y.items_calc,
    rev:   y.revenue,
    mkt:   y.market,
    ll: (launchMap[y.id] || []).map(l => ({
      n:           l.name,
      d:           l.detail,
      sub:         buildSub(l),
      launch_date: l.launch_date,
      item_count:  l.item_count,
      tag:         l.is_urgent ? null : l.status_tag,
      urg:         l.is_urgent,
      g:           l.group
    }))
  }));

  return YEARS;
}

/* Estado global preservable entre reloads y navegaciones editor↔timeline */
let _aActive = parseInt(localStorage.getItem('tl_yr_a') || '0', 10);
let _fActive = parseInt(localStorage.getItem('tl_yr_f') || '0', 10);
let _curV    = localStorage.getItem('tl_view') || 'accordion';
let _hitoData   = [];   /* datos de hitos para popup — se reconstruye en cada renderAll */
let _activeHito   = null;
let _switchTimer  = null;   /* timer del cierre-antes-de-abrir */

/* ── Abre el popup con animación de entrada (siempre desde cerrado) ── */
function _openPopup(popup, hito, clickY) {
  const d = _hitoData[parseInt(hito.dataset.hi, 10)];
  if (!d) return;

  const tagHtml = d.urg
    ? `<span class="tag tag-urg">${TM.urg}</span>`
    : (d.tag ? `<span class="tag tag-${d.tag}">${TM[d.tag]}</span>` : '');

  const subParts = [];
  if (d.items) subParts.push(`${d.items} items`);
  if (d.date)  subParts.push(d.date);

  popup.innerHTML =
    (tagHtml ? `<div class="hp-tag">${tagHtml}</div>` : '') +
    `<div class="hp-name">${d.n}</div>` +
    (d.d ? `<div class="hp-det">${d.d.split(' · ').join('<br>')}</div>` : '') +
    (subParts.length ? `<div class="hp-sub">${subParts.join(' · ')}</div>` : '');

  const isBelow = !!hito.closest('.row-below');
  popup.style.display = 'block';
  popup.classList.remove('hp-vis', 'hp-down');
  if (isBelow) popup.classList.add('hp-down');

  const rect = hito.getBoundingClientRect();
  const pw   = 240;
  let left   = rect.left + rect.width / 2 - pw / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
  popup.style.left = left + 'px';

  if (isBelow) {
    popup.style.top    = (clickY + 10) + 'px';
    popup.style.bottom = 'auto';
  } else {
    popup.style.bottom = (window.innerHeight - clickY + 10) + 'px';
    popup.style.top    = 'auto';
  }

  /* Clamp vertical: evitar que se salga de la ventana */
  const pr = popup.getBoundingClientRect();
  if (pr.top < 8) {
    popup.style.bottom = 'auto';
    popup.style.top    = '8px';
  } else if (pr.bottom > window.innerHeight - 8) {
    popup.style.top    = 'auto';
    popup.style.bottom = '8px';
  }

  popup.offsetHeight;             /* forzar reflow para que la transición se dispare */
  popup.classList.add('hp-vis');
  _activeHito = hito;
}

/* ── Popup helpers (module-scope para ser accesibles desde renderAll) ── */
function showHitoPopup(hito, clickY) {
  const popup = document.getElementById('hito-popup');
  if (!popup) return;

  /* Si el popup está abierto O está en medio del cierre animado:
     cancelar el timer pendiente, iniciar fade-out y encolar la apertura del nuevo */
  if (_activeHito !== null || _switchTimer !== null) {
    if (_switchTimer) { clearTimeout(_switchTimer); _switchTimer = null; }
    popup.classList.remove('hp-vis');
    _activeHito = null;
    _switchTimer = setTimeout(() => {
      _switchTimer = null;
      popup.style.display = 'none';
      _openPopup(popup, hito, clickY);
    }, 250);   /* debe ser >= duración de la transición de cierre (~240ms) */
    return;
  }

  /* Popup cerrado normalmente: abrir directo con animación */
  _openPopup(popup, hito, clickY);
}

function hideHitoPopup() {
  const popup = document.getElementById('hito-popup');
  if (!popup) return;
  if (_switchTimer) { clearTimeout(_switchTimer); _switchTimer = null; }
  popup.classList.remove('hp-vis');
  setTimeout(() => { if (!popup.classList.contains('hp-vis')) popup.style.display = 'none'; }, 260);
  _activeHito = null;
}
let _dataFP   = '';   /* fingerprint para detectar cambios cross-device */

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
let _renderAbort = null;  /* AbortController para limpiar listeners en cada re-render */

function renderAll(YEARS) {
  /* Cancelar todos los listeners del render anterior para evitar duplicados */
  if (_renderAbort) _renderAbort.abort();
  _renderAbort = new AbortController();
  const signal = _renderAbort.signal;

  _hitoData = [];   /* reset para re-render limpio */

  /* Sincronizar con el año seleccionado en el editor (tl_yr_id = DB id del año) */
  const savedYrId = localStorage.getItem('tl_yr_id');
  if (savedYrId) {
    const idx = YEARS.findIndex(y => String(y.id) === String(savedYrId));
    if (idx >= 0) { _aActive = idx; _fActive = idx; }
  }

  const segsEl   = document.getElementById('segs');
  const tlAccent = document.getElementById('tlAccent');
  const fcYears  = document.getElementById('fcYears');
  const fcPanes  = document.getElementById('fcPanes');
  const fcProg   = document.getElementById('fcProg');
  let   aActive  = Math.min(_aActive, YEARS.length - 1);
  let   fActive  = Math.min(_fActive, YEARS.length - 1);

  /* ── ACORDEÓN ── */
  YEARS.forEach((y, yi) => {
    const N  = y.ll.length;
    const ab = [], bl = [];

    y.ll.forEach((l, i) => {
      const x     = ((i + 0.5) / N * 100).toFixed(3);
      const above = i % 2 === 0;
      const tagHtml = l.urg
        ? `<span class="tag tag-urg">${TM.urg}</span>`
        : (l.tag ? `<span class="tag tag-${l.tag}">${TM[l.tag]}</span>` : '');

      /* fecha y items separados */
      const datePart  = l.launch_date ? fmtDate(l.launch_date) : '';
      const itemsPart = l.item_count  ? `${l.item_count} items` : '';

      /* índice en _hitoData para el popup */
      const hi = _hitoData.length;
      _hitoData.push({ n: l.n, d: l.d, date: datePart, items: l.item_count, tag: l.tag, urg: l.urg });

      const lbl = `
        <div class="hlabel" style="display:flex;flex-direction:column;align-items:center;gap:1px;width:max-content;text-align:center;">
          ${tagHtml ? `<div class="hline-tag">${tagHtml}</div>` : ''}
          <div class="hline-name">${l.n}</div>
          ${datePart    ? `<div class="hline-date">${datePart}</div>`   : ''}
          ${itemsPart   ? `<div class="hline-items">${itemsPart}</div>` : ''}
        </div>`;
      const stm = `<div class="stem"></div>`;
      const html = `<div class="hito" data-hi="${hi}" style="left:${x}%">${above ? lbl+stm : stm+lbl}</div>`;
      above ? ab.push(html) : bl.push(html);
    });

    const seg = document.createElement('div');
    seg.className = `seg${yi===aActive?' active':''}`;
    seg.dataset.yi = yi;
    seg.innerHTML = `
      <div class="circle-wrap">
        <div class="circle-inner${y.cur?' current':''}">${y.year}</div>
      </div>
      <div class="year-stats">
        ${y.items?`<div class="ys-main">${y.items} Items</div>`:''}
        ${y.rev  ?`<div class="ys-rev">${y.rev}</div>`:''}
        ${y.calc ?`<div class="ys-calc">${y.calc}</div>`:''}
      </div>
      ${y.mkt?`<div class="year-market"><div class="market-pill">${mktHtml(y.mkt)}</div></div>`:''}
      <div class="seg-body">
        <div class="row-above">${ab.join('')}</div>
        <div class="row-below">${bl.join('')}</div>
      </div>`;
    segsEl.appendChild(seg);
  });

  /* ── FICHAS ── */
  YEARS.forEach((y, i) => {
    /* Todos los hitos en una sola sección, ordenados por mes */
    const allLL = [...y.ll].sort((a, b) => {
      if (a.launch_date && b.launch_date) return a.launch_date.localeCompare(b.launch_date);
      if (a.launch_date) return -1;
      if (b.launch_date) return 1;
      return (a.position - b.position) || 0;
    });

    const node = document.createElement('div');
    node.className = 'fc-node' + (i===fActive?' active':'');
    node.dataset.i = i;
    const tickN = Math.min(allLL.length, 6);
    node.innerHTML = `
      <div class="fc-ticks-a">${genTicks(tickN, i)}</div>
      <div class="fc-circ${y.cur?' current':''}">${y.year}</div>
      <div class="fc-ticks-b">${genTicks(tickN, i + 17)}</div>`;
    node.addEventListener('click', () => fActivate(i));
    fcYears.appendChild(node);

    const pane = document.createElement('div');
    pane.className = 'fc-pane' + (i===fActive?' active':'');
    pane.dataset.i = i;

    /* Lee el color configurado para un tipo de tag y genera inline style */
    const tagStyle = key => {
      const col = localStorage.getItem('tl_col_' + key);
      return col ? ` style="background:${col};color:#fff;border:none;"` : '';
    };

    const cardRow = arr => arr.map(l => {
      const tagHtml = l.urg
        ? `<span class="tag tag-urg"${tagStyle('urg')}>${TM.urg}</span>`
        : (l.tag ? `<span class="tag tag-${l.tag}"${tagStyle(l.tag)}>${TM[l.tag]}</span>` : '');
      return `
        <div class="fc-card">
          ${tagHtml?`<div class="fc-card-tag">${tagHtml}</div>`:''}
          <div class="fc-card-name">${l.n}</div>
          ${l.d?`<div class="fc-card-detail">${l.d.split(' · ').join('<br>')}</div>`:''}
          ${l.sub?`<div class="fc-card-sub">${l.sub}</div>`:''}
        </div>`;
    }).join('');

    pane.innerHTML = `
      <div class="fc-ph">
        <div class="fc-nav">
          <button data-nav="${i-1}" ${i===0?'disabled':''}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button data-nav="${i+1}" ${i===YEARS.length-1?'disabled':''}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="fc-year-row">
          <div class="fc-yrl">${y.year}</div>
          <div class="fc-sts">
            ${y.items?`<div class="fc-st"><div class="sv">${y.items}</div><div class="sl">Items${y.calc?' — '+y.calc:''}</div></div>`:''}
            ${y.rev  ?`<div class="fc-sdv"></div><div class="fc-st"><div class="sv">${y.rev}</div><div class="sl">Revenue Est.</div></div>`:''}
            ${y.mkt  ?`<div class="fc-sdv"></div><div class="market-pill">${mktHtml(y.mkt)}</div>`:''}
          </div>
        </div>
      </div>
      ${allLL.length?`<div><div class="fc-sec-lbl">Detalle de lanzamientos</div><div class="fc-cards">${cardRow(allLL)}</div></div>`:''}`;
    /* Flechas — event listeners en vez de onclick para acceder a fActivate local */
    pane.querySelectorAll('[data-nav]').forEach(btn => {
      btn.addEventListener('click', () => fActivate(+btn.dataset.nav));
    });
    fcPanes.appendChild(pane);
  });

  /* ── FUNCIONES DE NAVEGACIÓN ── */

  /* Ancho del segmento colapsado (espejo del clamp CSS) */
  function getSegW() {
    return Math.max(64, Math.min(200, window.innerWidth * 0.10));
  }

  /* Posiciona todos los segmentos como cámara sobre un strip largo.
     El segmento activo siempre arranca en x=0 y ocupa (W - SW) o W si es el último.
     Los demás quedan fuera del viewport (izquierda o derecha). */
  function layoutSegs(idx, animate) {
    const segs = [...document.querySelectorAll('.seg')];
    const W    = segsEl.offsetWidth;
    const SW   = getSegW();
    const hasNext = idx < segs.length - 1;
    const AW   = hasNext ? W - SW : W;   /* ancho del segmento activo */

    if (!animate) {
      segs.forEach(s => { s.style.transition = 'none'; });
    }
    segs.forEach((s, i) => {
      if (i === idx) {
        s.style.width     = AW + 'px';
        s.style.transform = 'translateX(0)';
      } else if (i === idx + 1) {
        s.style.width     = SW + 'px';
        s.style.transform = `translateX(${AW}px)`;
      } else if (i < idx) {
        s.style.width     = SW + 'px';
        s.style.transform = `translateX(${-SW}px)`;  /* fuera por la izquierda */
      } else {
        s.style.width     = SW + 'px';
        s.style.transform = `translateX(${W}px)`;    /* fuera por la derecha */
      }
    });
    if (!animate) {
      requestAnimationFrame(() => {
        segs.forEach(s => { s.style.transition = ''; });
      });
    }
  }

  function aActivate(idx) {
    if (idx === aActive) return;
    aActive = idx; _aActive = idx;
    localStorage.setItem('tl_yr_a',    idx);
    localStorage.setItem('tl_yr_id',   YEARS[idx].id);
    localStorage.setItem('tl_yr_year', YEARS[idx].year);
    document.querySelectorAll('.seg').forEach((s,i) => s.classList.toggle('active', i===idx));
    layoutSegs(idx, true);
    posAccent(idx);
  }

  function posAccent(idx) {
    const W       = segsEl.offsetWidth;
    const SW      = getSegW();
    const segs    = document.querySelectorAll('.seg');
    const hasNext = idx < segs.length - 1;
    const AW      = hasNext ? W - SW : W;
    /* segsEl está desplazado del borde de tl-wrap por el padding — hay que sumarlo */
    const pad     = segsEl.offsetLeft;
    const x0 = pad + SW / 2;
    const x1 = hasNext ? pad + AW + SW / 2 : pad + AW;
    tlAccent.style.left  = x0 + 'px';
    tlAccent.style.width = (x1 - x0) + 'px';
  }

  segsEl.addEventListener('click', e => {
    /* Solo responder a clics directamente en el circle-wrap o circle-inner */
    const cw = e.target.closest('.circle-wrap');
    if (!cw) return;
    const s = cw.closest('.seg');
    if (!s) return;
    const clickedIdx = +s.dataset.yi;
    if (clickedIdx === aActive) {
      if (aActive > 0) aActivate(aActive - 1);
    } else {
      aActivate(Math.min(aActive + 1, YEARS.length - 1));
    }
  }, { signal });

  function fActivate(idx) {
    if (idx < 0 || idx >= YEARS.length || idx === fActive) return;
    const dir  = idx > fActive ? 1 : -1;
    const prev = fcPanes.querySelector('.fc-pane.active');
    const next = fcPanes.querySelectorAll('.fc-pane')[idx];
    prev.classList.remove('active');
    prev.style.cssText = `opacity:0;transform:translateX(${dir>0?'-60px':'60px'})`;
    next.style.cssText = `opacity:0;transform:translateX(${dir*60}px)`;
    next.classList.add('active');
    requestAnimationFrame(() => requestAnimationFrame(() => { next.style.cssText = ''; }));
    setTimeout(() => { prev.style.cssText = ''; }, 420);
    fActive = idx; _fActive = idx;
    localStorage.setItem('tl_yr_f', idx);
    fcYears.querySelectorAll('.fc-node').forEach((n,i) => n.classList.toggle('active', i===idx));
    updateFcProg();
  }

  function updateFcProg() {
    const W    = fcYears.offsetWidth;
    if (!W) return;
    const node = fcYears.querySelectorAll('.fc-node')[fActive];
    fcProg.style.width = ((node.offsetLeft + node.offsetWidth/2) / W * 100) + '%';
  }

  /* ── VIEW SWITCH ── */
  const vaEl  = document.getElementById('va');
  const vfEl  = document.getElementById('vf');
  const vBtn  = document.getElementById('viewToggle');
  const hint  = document.getElementById('hint');
  let   curV  = _curV;

  const SVG_CARDS    = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="3" width="6" height="10" rx=".5"/><rect x="9" y="3" width="6" height="10" rx=".5"/></svg>`;
  const SVG_TIMELINE = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="1" y1="8" x2="15" y2="8"/><circle cx="4" cy="8" r="1.8" fill="currentColor"/><circle cx="8" cy="8" r="1.8" fill="currentColor"/><circle cx="12" cy="8" r="1.8" fill="currentColor"/></svg>`;

  function setViewBtn(v) {
    vBtn.innerHTML = v==='accordion'
      ? SVG_CARDS    + ' Fichas'
      : SVG_TIMELINE + ' Timeline';
  }

  vBtn.addEventListener('click', () => {
    if (curV === 'accordion') {
      curV = 'fichas'; _curV = 'fichas';
      localStorage.setItem('tl_view', 'fichas');
      vaEl.classList.remove('active'); vfEl.classList.add('active');
      setViewBtn('fichas');
      hint.textContent = 'Clic en un año para ver detalle · ← → teclado';
      if (aActive !== fActive) fActivate(aActive);
      updateFcProg();
    } else {
      curV = 'accordion'; _curV = 'accordion';
      localStorage.setItem('tl_view', 'accordion');
      vfEl.classList.remove('active'); vaEl.classList.add('active');
      setViewBtn('accordion');
      hint.textContent = 'Clic en un año para desplegar · ← → teclado';
      if (fActive !== aActive) aActivate(fActive);
      layoutSegs(aActive, false);
      posAccent(aActive);
    }
  }, { signal });

  /* ── THEME — sincronizado con localStorage ── */
  let dark = localStorage.getItem('alq-theme') === 'dark';
  if (dark) {
    document.documentElement.classList.add('dark');
    document.getElementById('iMoon').style.display = 'none';
    document.getElementById('iSun').style.display  = '';
  }
  const metaTheme = document.getElementById('metaTheme');
  function applyTheme(isDark) {
    document.documentElement.classList.toggle('dark', isDark);
    document.getElementById('iMoon').style.display = isDark ? 'none' : '';
    document.getElementById('iSun').style.display  = isDark ? ''     : 'none';
    if (metaTheme) metaTheme.content = isDark ? '#111c26' : '#ffffff';
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    dark = !dark;
    applyTheme(dark);
    localStorage.setItem('alq-theme', dark ? 'dark' : 'light');
  }, { signal });

  /* ── LENGÜETA DE CONTROLES ── */
  const ctrlTab    = document.getElementById('ctrlTab');
  const ctrlHandle = document.getElementById('ctrlHandle');
  ctrlHandle.addEventListener('click', e => {
    e.stopPropagation();
    ctrlTab.classList.toggle('open');
  }, { signal });
  document.addEventListener('click', e => {
    if (!ctrlTab.contains(e.target)) ctrlTab.classList.remove('open');
  }, { signal });

  /* ── BOTÓN FULLSCREEN ── */
  const fsBtn      = document.getElementById('fsToggle');
  const iExpand    = document.getElementById('iExpand');
  const iCompress  = document.getElementById('iCompress');

  function updateFsIcon() {
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    iExpand.style.display   = isFs ? 'none' : '';
    iCompress.style.display = isFs ? '' : 'none';
  }

  fsBtn.addEventListener('click', () => {
    const el = document.documentElement;
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      (document.exitFullscreen || document.webkitExitFullscreen)?.call(document).catch(() => {});
    } else {
      (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el).catch(() => {});
    }
  }, { signal });

  document.addEventListener('fullscreenchange',       updateFsIcon, { signal });
  document.addEventListener('webkitfullscreenchange', updateFsIcon, { signal });

  /* ── FULLSCREEN AUTOMÁTICO EN LANDSCAPE (móvil) ── */
  function tryFullscreen() {
    const isLandscape = window.innerWidth > window.innerHeight;
    const el = document.documentElement;
    if (isLandscape) {
      (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen)
        ?.call(el).catch(() => {});
    } else {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        (document.exitFullscreen || document.webkitExitFullscreen)
          ?.call(document).catch(() => {});
      }
    }
  }
  window.addEventListener('orientationchange', () => setTimeout(tryFullscreen, 200), { signal });
  screen.orientation?.addEventListener('change', () => setTimeout(tryFullscreen, 200), { signal });

  /* ── TOUCH ── */
  (function () {
    let tx = 0;
    const va = document.getElementById('va');
    va.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true, signal });
    va.addEventListener('touchend',   e => {
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 50) {
        if (dx < 0) aActivate(Math.min(aActive + 1, YEARS.length - 1));
        else        aActivate(Math.max(aActive - 1, 0));
      }
    }, { passive: true, signal });
  })();

  /* ── KEYBOARD ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') curV==='accordion' ? aActivate(Math.min(aActive+1,YEARS.length-1)) : fActivate(fActive+1);
    if (e.key === 'ArrowLeft')  curV==='accordion' ? aActivate(Math.max(aActive-1,0))               : fActivate(fActive-1);
  }, { signal });

  /* ── INIT — restaurar vista y año guardados ── */
  if (_curV === 'fichas') {
    curV = 'fichas';
    vaEl.classList.remove('active'); vfEl.classList.add('active');
    setViewBtn('fichas');
    hint.textContent = 'Clic en un año para ver detalle · ← → teclado';
  } else {
    setViewBtn('accordion');
  }
  /* Siempre sincronizar estado del año activo (incluso en el render inicial) */
  if (YEARS[aActive]) {
    localStorage.setItem('tl_yr_a',   aActive);
    localStorage.setItem('tl_yr_id',  YEARS[aActive].id);
    localStorage.setItem('tl_yr_year', YEARS[aActive].year);
  }

  layoutSegs(aActive, false);
  posAccent(aActive);
  updateFcProg();
  window.addEventListener('resize', () => { layoutSegs(aActive, false); posAccent(aActive); updateFcProg(); }, { signal });

  /* ── Popup de hito (delegación en #segs, con AbortController) ── */
  document.getElementById('segs').addEventListener('click', e => {
    const hito = e.target.closest('.hito');
    if (hito) {
      e.stopPropagation();
      if (hito === _activeHito) { hideHitoPopup(); return; }
      showHitoPopup(hito, e.clientY);
      return;
    }
    if (_activeHito) hideHitoPopup();
  }, { signal });

  /* Cualquier click cierra el popup — incluso si tapa el hito */
  document.addEventListener('click', () => {
    if (_activeHito) hideHitoPopup();
  }, { signal });
}

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
(async () => {
  /* ── URG blink en JS — funciona en iOS Low Power Mode y prefers-reduced-motion ── */
  (function urgBlink() {
    let on = true;
    function tick() {
      on = !on;
      const op = on ? '1' : '0.3';
      document.querySelectorAll('.tag-urg').forEach(el => el.style.opacity = op);
      const lsw = document.getElementById('tl-lsw-urg');
      if (lsw) lsw.style.opacity = op;
    }
    setInterval(tick, 900); // 900ms × 2 = 1.8s ciclo completo
  })();

  try {
    const YEARS = await loadData();
    renderAll(YEARS);
  } catch (err) {
    console.error('Error cargando datos:', err);
    document.getElementById('loading').innerHTML =
      `<div class="loading-label" style="color:red">Error al conectar con Supabase</div>`;
    return;
  }

  /* Ocultar loading */
  const ld = document.getElementById('loading');
  if (ld) { ld.classList.add('fade-out'); setTimeout(() => ld?.remove(), 500); }

  /* ── Live reload desde editor (BroadcastChannel) ── */
  let _reloading = false;
  async function tlReload() {
    if (_reloading) return;
    _reloading = true;
    try {
      const YEARS = await loadData();
      /* Limpiar contenedores antes de re-renderizar */
      document.getElementById('segs').innerHTML    = '';
      document.getElementById('fcYears').innerHTML = '';
      document.getElementById('fcPanes').innerHTML = '';
      renderAll(YEARS);
    } catch(e) { console.warn('Live reload error:', e); }
    finally { _reloading = false; }
  }

  /* Mismo dispositivo: BroadcastChannel (instantáneo) */
  const tlChannel = new BroadcastChannel('timeline_updates');
  tlChannel.addEventListener('message', e => {
    if (e.data?.type === 'data_changed') tlReload();
  });

  /* Otros dispositivos: polling cada 15s comparando fingerprint de datos */
  setInterval(async () => {
    if (document.hidden || _reloading) return;
    try {
      const [cfg, yrs, lch] = await Promise.all([
        supa('timeline_config?select=*&id=eq.1'),
        supa('timeline_years?select=*&order=year.asc'),
        supa('timeline_launches?select=*&order=position.asc')
      ]);
      const fp = JSON.stringify([cfg, yrs, lch]);
      if (_dataFP && fp !== _dataFP) {
        _dataFP = fp;  /* actualizar antes para evitar doble disparo */
        tlReload();
      }
    } catch(e) { /* silencioso — no interrumpir la experiencia */ }
  }, 3000);

  /* ── A− / A+ font scale ── */
  const SCALE_STEP = 0.1, SCALE_MIN = 0.7, SCALE_MAX = 1.5;
  function setScale(s) {
    _fontScale = Math.round(Math.min(SCALE_MAX, Math.max(SCALE_MIN, s)) * 10) / 10;
    document.documentElement.style.setProperty('--tl-fscale', _fontScale);
    localStorage.setItem('tl_fscale', _fontScale);
    supaUpsert('timeline_config', { id: 1, font_scale: _fontScale });
  }
  document.getElementById('fontMinus')?.addEventListener('click', () => setScale(_fontScale - SCALE_STEP));
  document.getElementById('fontPlus')?.addEventListener('click',  () => setScale(_fontScale + SCALE_STEP));
})();
</script>

<div id="hito-popup"></div>
</body>
</html>
