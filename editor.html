<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor — Línea del Tiempo</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Cpath d='M10 4h12v1l-5 7-1 1-1-1-5-7V4zm0 24h12v-1l-5-7-1-1-1 1-5 7v1zm1-1h10l-4-5.5-.5-.7-.5.7L11 27zm1-22l4 5.5.5.7.5-.7L21 5H11z' fill='%23fff'/%3E%3Crect x='9' y='4' width='14' height='1.5' fill='%23fff'/%3E%3Crect x='9' y='26.5' width='14' height='1.5' fill='%23fff'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff; --fg:#000000;
  --g10:#f5f5f5; --g20:#e0e0e0; --g40:#999; --g60:#666; --g90:#1a1a1a;
  --accent:#0066ff;
  --danger:#cc2200;
  --font:'Space Grotesk','Helvetica Neue',Arial,sans-serif;
}
html.dark {
  --bg:#111c26; --fg:#d8e8f2;
  --g10:#1a2c3a; --g20:#2e4455; --g40:#627a8e; --g60:#8aacbe; --g90:#c8dce8;
  --accent:#4d9fff;
}
html.dark body { background: linear-gradient(rgb(0,0,0) 0%, rgb(26,32,40) 50%, rgb(41,56,69) 100%) fixed; }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--g10);color:var(--fg);min-height:100vh;}

/* ── HEADER ── */
.hdr{
  background:var(--bg); border-bottom:1px solid var(--g20);
  padding:14px 32px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:50;
}
.hdr h1{font-size:14px;font-weight:600;letter-spacing:-.01em;}
.hdr h1 span{font-weight:400;color:var(--g60);margin-left:8px;font-size:12px;}
.hdr-right{display:flex;gap:8px;align-items:center;}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border:1.5px solid var(--g20);background:none;
  font-family:var(--font);font-size:11px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;color:var(--fg);
  cursor:pointer;text-decoration:none;
  transition:border-color .2s,background .2s,color .2s;
}
.btn:hover{border-color:var(--fg);background:var(--fg);color:var(--bg);}
.btn-accent{border-color:var(--accent);color:var(--accent);}
.btn-accent:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-danger{border-color:var(--danger);color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn svg{width:11px;height:11px;}

/* ── LAYOUT ── */
.wrap{max-width:1100px;margin:0 auto;padding:28px 24px;}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--g20);margin-bottom:24px;}
.tab{
  padding:8px 20px;font-size:11px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--g60);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;
  transition:color .2s,border-color .2s;
}
.tab.active{color:var(--fg);border-bottom-color:var(--fg);}

/* ── CARDS ── */
.section-label{
  font-size:8px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;
  color:var(--g40);margin-bottom:12px;
}
.card{
  background:var(--bg);border:1px solid var(--g20);
  margin-bottom:10px;
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;cursor:pointer;
  border-bottom:1px solid transparent;
  transition:border-color .2s;
  gap:8px;
}
.card-header.open{border-bottom-color:var(--g20);}
/* contenedor izquierdo: title + meta en fila, envuelve solo si no cabe */
.card-header > div:first-child{
  display:flex;align-items:baseline;gap:10px;
  min-width:0;flex:1;overflow:hidden;
}
.card-title{font-size:13px;font-weight:600;white-space:nowrap;}
.card-meta{font-size:10px;color:var(--g60);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0;}
/* en pantalla pequeña se permite apilar */
@media(max-width:520px){
  .card-header > div:first-child{flex-wrap:wrap;gap:2px 6px;}
  .card-title,.card-meta{white-space:normal;}
}
.card-actions{display:flex;gap:6px;align-items:center;}
.btn-del-year{
  background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;
  color:var(--g40);display:flex;align-items:center;transition:color .15s,background .15s;
}
.btn-del-year:hover{color:#cc2200;background:rgba(204,34,0,.08);}
.card-body{display:none;padding:16px;}
.card-body.open{display:block;}

/* ── FORM GRID ── */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group.full{grid-column:1/-1;}
label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--g60);}
input,select,textarea{
  font-family:var(--font);font-size:12px;
  border:1.5px solid var(--g20);background:var(--bg);color:var(--fg);
  padding:7px 10px;outline:none;width:100%;
  transition:border-color .2s;
}
input:focus,select:focus,textarea:focus{border-color:var(--fg);}
textarea{resize:vertical;min-height:60px;}
select{cursor:pointer;}

/* ── TOGGLE ── */
.toggle-row{display:flex;align-items:center;gap:10px;padding:4px 0;}
.toggle-row label{text-transform:none;letter-spacing:0;font-size:12px;font-weight:500;color:var(--fg);cursor:pointer;}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--fg);}

/* ── TOAST ── */
.toast{
  position:fixed;top:20px;right:20px;
  background:var(--fg);color:var(--bg);
  padding:10px 18px;font-size:11px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  opacity:0;transform:translateY(-8px);
  transition:opacity .3s,transform .3s;
  pointer-events:none;z-index:200;
}
.toast.show{opacity:1;transform:translateY(0);}

/* ── ADD FORM ── */
.add-section{
  border:1.5px dashed var(--g20);padding:16px;
  margin-top:12px;display:none;
}
.add-section.open{display:block;}
.add-title{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--g60);margin-bottom:12px;}

/* ── LOADING ── */
.loading{text-align:center;padding:40px;color:var(--g60);font-size:12px;letter-spacing:.1em;text-transform:uppercase;}

/* ── YEAR PILL (inline badge) ── */
.year-pill{
  display:inline-block;padding:2px 8px;
  background:var(--g10);border:1px solid var(--g20);
  font-size:10px;font-weight:700;color:var(--g60);
}

/* ── TAG BADGE ── */
.badge{
  display:inline-block;font-size:9px;font-weight:700;
  padding:1px 6px;letter-spacing:.08em;text-transform:uppercase;
  vertical-align:middle;margin-left:4px;
}
.badge-new{background:#000;color:#fff;}
.badge-upd{background:var(--g20);color:var(--g90);}
.badge-urg{background:#cc2200;color:#fff;}

/* ── YEAR FILTER BAR ── */
.year-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.ypill{
  display:inline-flex;align-items:center;
  padding:5px 16px;border:1.5px solid var(--g20);background:none;
  font-family:var(--font);font-size:10px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:var(--g60);
  cursor:pointer;transition:all .15s;
}
.ypill:hover{border-color:var(--fg);color:var(--fg);}
.ypill.active{background:var(--fg);color:var(--bg);border-color:var(--fg);}

/* ── CONFIRM MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:400;
  align-items:center;justify-content:center;
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--bg);border:1.5px solid var(--g20);
  padding:28px 32px;max-width:380px;width:90%;
}
.modal-msg{font-size:13px;font-weight:500;line-height:1.55;margin-bottom:22px;color:var(--fg);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div>
    <h1>Editor <span>Línea del Tiempo — Quinquenio Joyas</span></h1>
  </div>
  <div class="hdr-right">
    <button class="btn" id="themeToggle" title="Cambiar tema">
      <svg id="iMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="iSun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
    </button>
    <a class="btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Ver Timeline
    </a>
  </div>
</header>

<div class="wrap">
  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" data-tab="years">Años</div>
    <div class="tab" data-tab="launches">Hitos</div>
  </div>

  <!-- TAB: AÑOS -->
  <div id="tab-years">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="section-label" id="years-label">Años</div>
      <button class="btn btn-accent" id="btn-add-year">+ Nuevo año</button>
    </div>

    <!-- Formulario nuevo año -->
    <div class="add-section" id="add-year-form">
      <div class="add-title">Nuevo año</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Año</label>
          <input type="number" id="new-year-num" placeholder="Ej: 2031" min="2020" max="2099">
        </div>
        <div class="form-group">
          <div class="toggle-row" style="margin-top:20px;">
            <input type="checkbox" id="new-year-current">
            <label for="new-year-current">Marcar como año actual</label>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn btn-accent" id="btn-save-new-year">Crear año</button>
        <button class="btn" id="btn-cancel-new-year">Cancelar</button>
      </div>
    </div>

    <div id="years-list"><div class="loading">Cargando...</div></div>
  </div>

  <!-- TAB: HITOS -->
  <div id="tab-launches" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div class="section-label" id="launches-label">Hitos</div>
      <button class="btn btn-accent" id="btn-add-launch">+ Nuevo hito</button>
    </div>

    <!-- Barra de filtro por año -->
    <div class="year-bar" id="year-bar">
      <button class="ypill active" data-id="">Todos</button>
    </div>

    <!-- Buscador -->
    <div style="margin-bottom:16px;">
      <input type="text" id="search-launch" placeholder="Buscar hito..." style="width:100%;">
    </div>

    <!-- Formulario nuevo hito -->
    <div class="add-section" id="add-launch-form">
      <div class="add-title">Nuevo hito</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Año</label>
          <select id="new-year-id"></select>
        </div>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="new-name" placeholder="Ej: Anti-caída R11">
        </div>
        <div class="form-group">
          <label>Detalle</label>
          <input type="text" id="new-detail" placeholder="Ej: SH · AC · Gotero">
        </div>
        <div class="form-group">
          <label>Cantidad items</label>
          <input type="number" id="new-item-count" placeholder="Ej: 3">
        </div>
        <div class="form-group">
          <label>Mes de lanzamiento</label>
          <select id="new-launch-month">
            <option value="">Sin mes</option>
            <option value="01">Enero</option><option value="02">Febrero</option>
            <option value="03">Marzo</option><option value="04">Abril</option>
            <option value="05">Mayo</option><option value="06">Junio</option>
            <option value="07">Julio</option><option value="08">Agosto</option>
            <option value="09">Septiembre</option><option value="10">Octubre</option>
            <option value="11">Noviembre</option><option value="12">Diciembre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tag</label>
          <select id="new-status-tag">
            <option value="">Sin tag</option>
            <option value="new">NEW</option>
            <option value="upd">UPD</option>
            <option value="urg">URG</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn btn-accent" id="btn-save-new-launch">Guardar hito</button>
        <button class="btn" id="btn-cancel-new-launch">Cancelar</button>
      </div>
    </div>

    <div id="launches-list"><div class="loading">Cargando...</div></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="modal-bg" id="confirmModal">
  <div class="modal">
    <div class="modal-msg" id="confirmMsg"></div>
    <div class="modal-btns">
      <button class="btn" id="confirmCancel">Cancelar</button>
      <button class="btn btn-danger" id="confirmOk">Eliminar</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const SUPA_URL = 'https://utkqzxsnyvblqndtkntx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0a3F6eHNueXZibHFuZHRrbnR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTU5MjEsImV4cCI6MjA5MDQ5MTkyMX0.bxOZDHRtsYBkplffNzoxc2-OQMvG8qXdX_bXxg_CYlA';

const HEADERS = {
  'apikey': SUPA_KEY,
  'Authorization': `Bearer ${SUPA_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

const api = {
  get:    (table, query='') =>
    fetch(`${SUPA_URL}/rest/v1/${table}?${query}`, { headers: HEADERS }).then(r => r.json()),
  patch:  (table, id, body) =>
    fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'PATCH', headers: HEADERS, body: JSON.stringify(body)
    }).then(r => r.json()),
  post:   (table, body) =>
    fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method:'POST', headers: HEADERS, body: JSON.stringify(body)
    }).then(r => r.json()),
  delete: (table, id) =>
    fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'DELETE', headers: HEADERS
    })
};

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let years    = [];
let launches = [];

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ══════════════════════════════════════════
   CONFIRM MODAL (reemplaza confirm() nativo)
══════════════════════════════════════════ */
function confirmModal(msg) {
  return new Promise(resolve => {
    document.getElementById('confirmMsg').textContent = msg;
    const bg  = document.getElementById('confirmModal');
    const ok  = document.getElementById('confirmOk');
    const no  = document.getElementById('confirmCancel');
    bg.classList.add('open');

    const finish = val => {
      bg.classList.remove('open');
      ok.removeEventListener('click', onOk);
      no.removeEventListener('click', onNo);
      resolve(val);
    };
    const onOk = () => finish(true);
    const onNo = () => finish(false);
    ok.addEventListener('click', onOk);
    no.addEventListener('click', onNo);
    bg.addEventListener('click', e => { if (e.target === bg) finish(false); }, { once: true });
  });
}

/* Modal de aviso (solo OK, sin cancelar) */
function alertModal(msg) {
  return new Promise(resolve => {
    document.getElementById('confirmMsg').textContent = msg;
    const bg = document.getElementById('confirmModal');
    const ok = document.getElementById('confirmOk');
    const no = document.getElementById('confirmCancel');
    no.style.display = 'none';
    bg.classList.add('open');
    const finish = () => {
      bg.classList.remove('open');
      no.style.display = '';
      ok.removeEventListener('click', finish);
      resolve();
    };
    ok.addEventListener('click', finish, { once: true });
    bg.addEventListener('click', e => { if (e.target === bg) finish(); }, { once: true });
  });
}

/* ══════════════════════════════════════════
   SAVE
══════════════════════════════════════════ */
async function saveField(table, id, changes, onSuccess) {
  try {
    await api.patch(table, id, changes);
    toast('Guardado ✓');
    if (onSuccess) onSuccess();
  } catch(err) {
    toast('Error al guardar');
    console.error(err);
  }
}

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function fmtDate(d) {
  if (!d) return '—';
  const [y,m] = d.split('-');
  return `${MESES[parseInt(m,10)-1]} ${y}`;
}

function tagBadge(row) {
  if (row.is_urgent)             return `<span class="badge badge-urg">URG</span>`;
  if (row.status_tag === 'new')  return `<span class="badge badge-new">NEW</span>`;
  if (row.status_tag === 'upd')  return `<span class="badge badge-upd">UPD</span>`;
  return '';
}

/* ══════════════════════════════════════════
   RENDER AÑOS
══════════════════════════════════════════ */
function renderYears() {
  const el = document.getElementById('years-list');
  el.innerHTML = '';
  document.getElementById('years-label').textContent =
    `${years.length} año${years.length !== 1 ? 's' : ''} · Editar datos`;

  years.forEach(y => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header" data-id="${y.id}">
        <div>
          <div class="card-title">${y.year} ${y.is_current ? '<span class="badge badge-new">ACTUAL</span>' : ''}</div>
          <div class="card-meta">${y.items_label || '—'} items · ${y.revenue || '—'} · ${y.market || 'Sin mercado'}</div>
        </div>
        <div class="card-actions">
          <button class="btn-del-year" title="Eliminar año" data-yid="${y.id}" data-ynum="${y.year}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" style="color:var(--g40);transition:transform .2s" class="chevron"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="card-body" id="year-body-${y.id}">
        <div class="form-grid">
          <div class="form-group">
            <label>Items label</label>
            <input type="text" value="${y.items_label||''}" data-table="timeline_years" data-id="${y.id}" data-field="items_label" placeholder="Ej: 198">
          </div>
          <div class="form-group">
            <label>Items calc</label>
            <input type="text" value="${y.items_calc||''}" data-table="timeline_years" data-id="${y.id}" data-field="items_calc" placeholder="Ej: 148 + 50 nuevos">
          </div>
          <div class="form-group">
            <label>Revenue</label>
            <input type="text" value="${y.revenue||''}" data-table="timeline_years" data-id="${y.id}" data-field="revenue" placeholder="Ej: $1.65 MM">
          </div>
          <div class="form-group">
            <label>Mercado (market pill)</label>
            <input type="text" value="${y.market||''}" data-table="timeline_years" data-id="${y.id}" data-field="market" placeholder="Ej: Ecuador  o  Uruguay\nArgentina">
          </div>
          <div class="form-group">
            <div class="toggle-row">
              <input type="checkbox" id="cur-${y.id}" ${y.is_current?'checked':''} data-table="timeline_years" data-id="${y.id}" data-field="is_current">
              <label for="cur-${y.id}">Año actual (círculo con anillo)</label>
            </div>
          </div>
        </div>
      </div>`;
    el.appendChild(card);

    card.querySelector('.card-header').addEventListener('click', e => {
      if (e.target.closest('.btn-del-year')) return; /* no colapsar al borrar */
      const body = document.getElementById(`year-body-${y.id}`);
      const chev = card.querySelector('.chevron');
      const hdr  = card.querySelector('.card-header');
      const open = body.classList.toggle('open');
      hdr.classList.toggle('open', open);
      chev.style.transform = open ? 'rotate(180deg)' : '';
    });

    card.querySelector('.btn-del-year').addEventListener('click', async e => {
      e.stopPropagation();
      const yid  = +e.currentTarget.dataset.yid;
      const ynum =  e.currentTarget.dataset.ynum;
      const hitosCount = launches.filter(l => l.year_id === yid).length;
      const extra = hitosCount > 0
        ? ` Contiene ${hitosCount} hito${hitosCount !== 1 ? 's' : ''} que también serán eliminados.`
        : '';
      const ok = await confirmModal(`¿Eliminar el año ${ynum}?${extra} Esta acción no se puede deshacer.`);
      if (!ok) return;
      /* Primero borrar hitos asociados, luego el año */
      const hitosDeletes = launches
        .filter(l => l.year_id === yid)
        .map(l => api.delete('timeline_launches', l.id));
      await Promise.all(hitosDeletes);
      await api.delete('timeline_years', yid);
      toast(`Año ${ynum} eliminado`);
      loadAll();
    });
  });

  el.querySelectorAll('input[data-field]').forEach(inp => {
    const ev = inp.type === 'checkbox' ? 'change' : 'blur';
    inp.addEventListener(ev, () => {
      const val = inp.type === 'checkbox' ? inp.checked
                : (inp.type === 'number'  ? Number(inp.value) : inp.value || null);
      saveField(inp.dataset.table, inp.dataset.id, { [inp.dataset.field]: val });
    });
  });
}

/* ══════════════════════════════════════════
   RENDER HITOS
══════════════════════════════════════════ */
function renderLaunches(filterYearId = '', searchText = '') {
  const el   = document.getElementById('launches-list');
  const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'');
  const q    = norm(searchText.trim());
  let data   = filterYearId
    ? launches.filter(l => String(l.year_id) === String(filterYearId))
    : launches;
  if (q) data = data.filter(l =>
    norm(l.name   || '').includes(q) ||
    norm(l.detail || '').includes(q)
  );
  /* Ordenar: con fecha primero (año · mes), sin fecha al final por posición */
  data = [...data].sort((a, b) => {
    if (a.launch_date && b.launch_date) return a.launch_date.localeCompare(b.launch_date);
    if (a.launch_date) return -1;
    if (b.launch_date) return 1;
    return (a.position - b.position) || (a.id - b.id);
  });

  document.getElementById('launches-label').textContent = `${data.length} hitos`;
  el.innerHTML = '';

  data.forEach(l => {
    const y    = years.find(y => y.id === l.year_id);

    /* Meta: solo fecha — el tag ya aparece junto al nombre */
    const datePart = l.launch_date ? `<strong>${fmtDate(l.launch_date)}</strong>` : '';
    const metaHtml = datePart;

    /* Botones ↑↓ solo si el hito no tiene fecha (orden manual) */
    const moveBtns = l.launch_date ? '' : `
      <button class="btn btn-move" data-id="${l.id}" data-dir="up" style="padding:3px 7px;font-size:13px;line-height:1;" title="Subir">↑</button>
      <button class="btn btn-move" data-id="${l.id}" data-dir="dn" style="padding:3px 7px;font-size:13px;line-height:1;" title="Bajar">↓</button>`;

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header" data-id="${l.id}">
        <div>
          <div class="card-title">
            <span class="year-pill">${y ? y.year : '?'}</span>
            &nbsp;${l.name}${tagBadge(l)}
          </div>
          <div class="card-meta">${metaHtml}</div>
        </div>
        <div class="card-actions">
          ${moveBtns}
          <button class="btn btn-danger btn-del" data-id="${l.id}" style="padding:4px 10px;font-size:9px;">Eliminar</button>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" style="color:var(--g40);transition:transform .2s" class="chevron"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="card-body" id="launch-body-${l.id}">
        <div class="form-grid">
          <div class="form-group">
            <label>Año</label>
            <select data-table="timeline_launches" data-id="${l.id}" data-field="year_id">
              ${years.map(y=>`<option value="${y.id}" ${y.id===l.year_id?'selected':''}>${y.year}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" value="${l.name||''}" data-table="timeline_launches" data-id="${l.id}" data-field="name">
          </div>
          <div class="form-group">
            <label>Detalle</label>
            <input type="text" value="${l.detail||''}" data-table="timeline_launches" data-id="${l.id}" data-field="detail">
          </div>
          <div class="form-group">
            <label>Cantidad items</label>
            <input type="number" value="${l.item_count||''}" data-table="timeline_launches" data-id="${l.id}" data-field="item_count">
          </div>
          <div class="form-group">
            <label>Mes de lanzamiento</label>
            <select data-table="timeline_launches" data-id="${l.id}" data-field="launch_month" data-year-id="${l.year_id}">
              <option value="">Sin mes</option>
              ${['01','02','03','04','05','06','07','08','09','10','11','12'].map((m,i) =>
                `<option value="${m}" ${l.launch_date && l.launch_date.slice(5,7)===m ? 'selected' : ''}>${
                  ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][i]
                }</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Tag</label>
            <select data-table="timeline_launches" data-id="${l.id}" data-field="status_tag">
              <option value="" ${!l.status_tag && !l.is_urgent?'selected':''}>Sin tag</option>
              <option value="new" ${l.status_tag==='new'?'selected':''}>NEW</option>
              <option value="upd" ${l.status_tag==='upd'?'selected':''}>UPD</option>
              <option value="urg" ${l.is_urgent?'selected':''}>URG</option>
            </select>
          </div>
        </div>
      </div>`;
    el.appendChild(card);

    /* toggle — ignora clicks en botones de acción */
    card.querySelector('.card-header').addEventListener('click', e => {
      if (e.target.closest('.btn-del') || e.target.closest('.btn-move')) return;
      const body = document.getElementById(`launch-body-${l.id}`);
      const chev = card.querySelector('.chevron');
      const hdr  = card.querySelector('.card-header');
      const open = body.classList.toggle('open');
      hdr.classList.toggle('open', open);
      chev.style.transform = open ? 'rotate(180deg)' : '';
    });

    /* reordenar ↑↓ */
    card.querySelectorAll('.btn-move').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const dir   = btn.dataset.dir;
        const group = launches
          .filter(x => x.year_id === l.year_id)
          .sort((a, b) => (a.position - b.position) || (a.id - b.id));
        const ci    = group.findIndex(x => x.id === l.id);
        const si    = dir === 'up' ? ci - 1 : ci + 1;
        if (si < 0 || si >= group.length) return;
        [group[ci], group[si]] = [group[si], group[ci]];
        await Promise.all(
          group.map((item, idx) =>
            api.patch('timeline_launches', item.id, { position: idx })
          )
        );
        toast('Orden actualizado ✓');
        loadAll();
      });
    });

    /* eliminar con modal propio */
    card.querySelector('.btn-del').addEventListener('click', async e => {
      e.stopPropagation();
      const ok = await confirmModal(`¿Eliminar "${l.name}"? Esta acción no se puede deshacer.`);
      if (!ok) return;
      await api.delete('timeline_launches', l.id);
      toast('Hito eliminado');
      loadAll();
    });
  });

  /* inputs hitos */
  el.querySelectorAll('[data-field]').forEach(inp => {
    const ev = inp.tagName === 'SELECT' ? 'change' : (inp.type === 'checkbox' ? 'change' : 'blur');
    inp.addEventListener(ev, () => {
      let val;
      if (inp.type === 'checkbox') val = inp.checked;
      else if (inp.type === 'number') val = inp.value ? Number(inp.value) : null;
      else val = inp.value || null;

      if (inp.dataset.field === 'launch_month') {
        /* Construir launch_date = YYYY-MM-01 con el año del hito */
        const yr = years.find(y => String(y.id) === String(inp.dataset.yearId));
        const newDate = val && yr ? `${yr.year}-${val}-01` : null;
        saveField(inp.dataset.table, inp.dataset.id, { launch_date: newDate }, () => loadAll());
      } else if (inp.dataset.field === 'year_id') {
        /* Si el hito tiene fecha asignada, avisar que se borrará al cambiar de año */
        const launch = launches.find(l => String(l.id) === String(inp.dataset.id));
        if (launch && launch.launch_date) {
          const newYr = years.find(y => String(y.id) === String(val));
          alertModal(`El hito pasará al año ${newYr ? newYr.year : val}. El mes de lanzamiento se borrará porque debe pertenecer al año seleccionado.`);
          saveField(inp.dataset.table, inp.dataset.id, { year_id: Number(val), launch_date: null }, () => loadAll());
        } else {
          saveField(inp.dataset.table, inp.dataset.id, { year_id: Number(val) }, () => loadAll());
        }
      } else if (inp.dataset.field === 'status_tag') {
        const isUrg   = val === 'urg';
        const changes = isUrg
          ? { is_urgent: true,  status_tag: null }
          : { is_urgent: false, status_tag: val  };
        const card    = inp.closest('.card');
        const titleEl = card ? card.querySelector('.card-title') : null;
        if (titleEl) {
          titleEl.querySelectorAll('.badge').forEach(b => b.remove());
          const badge = tagBadge({ is_urgent: isUrg, status_tag: isUrg ? null : val });
          if (badge) titleEl.insertAdjacentHTML('beforeend', badge);
        }
        saveField(inp.dataset.table, inp.dataset.id, changes);
      } else {
        saveField(inp.dataset.table, inp.dataset.id, { [inp.dataset.field]: val });
      }
    });
  });
}

/* ══════════════════════════════════════════
   NUEVO HITO
══════════════════════════════════════════ */
document.getElementById('btn-add-launch').addEventListener('click', () => {
  document.getElementById('add-launch-form').classList.toggle('open');
});
document.getElementById('btn-cancel-new-launch').addEventListener('click', () => {
  document.getElementById('add-launch-form').classList.remove('open');
});
document.getElementById('btn-save-new-launch').addEventListener('click', async () => {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { toast('El nombre es obligatorio'); return; }

  const newYearId = Number(document.getElementById('new-year-id').value);
  const newMonth  = document.getElementById('new-launch-month').value;
  const newYrObj  = years.find(y => y.id === newYearId);
  const body = {
    year_id:     newYearId,
    name,
    detail:      document.getElementById('new-detail').value || null,
    item_count:  document.getElementById('new-item-count').value ? Number(document.getElementById('new-item-count').value) : null,
    launch_date: newMonth && newYrObj ? `${newYrObj.year}-${newMonth}-01` : null,
    position:    0,
    status_tag:  document.getElementById('new-status-tag').value === 'urg' ? null : (document.getElementById('new-status-tag').value || null),
    is_urgent:   document.getElementById('new-status-tag').value === 'urg',
    group:       'n'
  };

  await api.post('timeline_launches', body);
  toast('Hito creado ✓');
  document.getElementById('add-launch-form').classList.remove('open');
  ['new-name','new-detail','new-item-count','new-launch-month'].forEach(id => {
    document.getElementById(id).value = '';
  });
  loadAll();
});

/* ══════════════════════════════════════════
   NUEVO AÑO
══════════════════════════════════════════ */
document.getElementById('btn-add-year').addEventListener('click', () => {
  document.getElementById('add-year-form').classList.toggle('open');
});
document.getElementById('btn-cancel-new-year').addEventListener('click', () => {
  document.getElementById('add-year-form').classList.remove('open');
});
document.getElementById('btn-save-new-year').addEventListener('click', async () => {
  const yr = parseInt(document.getElementById('new-year-num').value, 10);
  if (!yr || yr < 2020 || yr > 2099) { toast('Introduce un año válido (2020–2099)'); return; }
  if (years.find(y => y.year === yr)) { toast('Ese año ya existe'); return; }
  const isCur = document.getElementById('new-year-current').checked;
  await api.post('timeline_years', { year: yr, is_current: isCur, sort_order: yr });
  toast(`Año ${yr} creado ✓`);
  document.getElementById('add-year-form').classList.remove('open');
  document.getElementById('new-year-num').value = '';
  document.getElementById('new-year-current').checked = false;
  loadAll();
});

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-years').style.display    = tab.dataset.tab === 'years'   ? '' : 'none';
    document.getElementById('tab-launches').style.display = tab.dataset.tab === 'launches' ? '' : 'none';
  });
});

/* Buscador */
document.getElementById('search-launch').addEventListener('input', () => {
  const activeYr = document.querySelector('#year-bar .ypill.active')?.dataset.id ?? '';
  renderLaunches(activeYr, document.getElementById('search-launch').value);
});

/* ══════════════════════════════════════════
   LOAD
══════════════════════════════════════════ */
async function loadAll() {
  [years, launches] = await Promise.all([
    api.get('timeline_years',   'select=*&order=year.asc'),
    api.get('timeline_launches','select=*&order=year_id.asc,position.asc,id.asc')
  ]);
  years.sort((a, b) => a.year - b.year);

  /* Guardar filtro activo actual */
  const activeYrId = document.querySelector('#year-bar .ypill.active')?.dataset.id ?? '';

  /* Poblar barra de año */
  const bar = document.getElementById('year-bar');
  bar.innerHTML =
    `<button class="ypill${!activeYrId?' active':''}" data-id="">Todos</button>` +
    years.map(y =>
      `<button class="ypill${String(y.id)===activeYrId?' active':''}" data-id="${y.id}">${y.year}</button>`
    ).join('');

  bar.querySelectorAll('.ypill').forEach(pill => {
    pill.addEventListener('click', () => {
      bar.querySelectorAll('.ypill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      renderLaunches(pill.dataset.id, document.getElementById('search-launch').value);
    });
  });

  /* Select de nuevo hito */
  const newYearSel = document.getElementById('new-year-id');
  newYearSel.innerHTML = years.map(y => `<option value="${y.id}">${y.year}</option>`).join('');

  renderYears();
  renderLaunches(activeYrId, document.getElementById('search-launch').value);
}

loadAll();

/* ══════════════════════════════════════════
   TEMA — sincronizado con localStorage
══════════════════════════════════════════ */
let dark = localStorage.getItem('alq-theme') === 'dark';
if (dark) {
  document.documentElement.classList.add('dark');
  document.getElementById('iMoon').style.display = 'none';
  document.getElementById('iSun').style.display  = '';
}
document.getElementById('themeToggle').addEventListener('click', () => {
  dark = !dark;
  document.documentElement.classList.toggle('dark', dark);
  document.getElementById('iMoon').style.display = dark ? 'none' : '';
  document.getElementById('iSun').style.display  = dark ? ''     : 'none';
  localStorage.setItem('alq-theme', dark ? 'dark' : 'light');
});
</script>
</body>
</html>
